services:
  allmightydlp:
    build:
      context: .
    container_name: allmightydlp
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      APP_TITLE: ${APP_TITLE:-AllMightyDLP}
      BASE_URL: ${BASE_URL:-}
      ALLOW_PLAYLISTS: ${ALLOW_PLAYLISTS:-true}
      DEFAULT_PROFILE: ${DEFAULT_PROFILE:-video}
      AUTH_USERNAME: ${AUTH_USERNAME:-}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      UMASK: ${UMASK:-002}
    restart: unless-stopped
