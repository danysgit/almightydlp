<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#080808">
    <title>AlmightyDLP</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="shell">
      <main class="panel">
        <form id="resolver-form" class="stack">
          <label class="field">
            <span>Paste a link</span>
            <input
              id="media-url"
              name="url"
              type="url"
              inputmode="url"
              placeholder="https://example.com/watch?v=..."
              autocomplete="off"
              required
            >
          </label>

          <label class="field">
            <span>Choose what to save</span>
            <select id="profile" name="profile">
              <option value="video">Video with sound</option>
              <option value="audio">Just the audio</option>
              <option value="original">Whichever link works best</option>
            </select>
            <p class="field__hint" id="profile-hint">Best for saving the full video.</p>
          </label>

          <div class="actions actions--bottom">
            <button class="button" type="submit" id="resolve-button">Get download links</button>
          </div>
        </form>

        <section class="status" id="working-state" hidden aria-live="polite">
          <div class="status__spinner" aria-hidden="true"></div>
          <p id="working-text">Getting your links. Playlists can take a little longer.</p>
        </section>

        <section class="card" id="inspection-card" hidden>
          <div class="card__head">
            <h2>What we found</h2>
            <span class="pill" id="inspection-type">Media</span>
          </div>
          <div class="inspection">
            <img id="inspection-thumb" alt="" hidden>
            <div class="inspection__meta">
              <strong id="inspection-title">Untitled</strong>
              <p id="inspection-subtitle">Waiting for URL inspection…</p>
              <a id="inspection-link" href="#" target="_blank" rel="noreferrer" hidden>Open original page</a>
            </div>
          </div>
        </section>

        <section class="card" id="result-card" hidden>
          <div class="card__head">
            <h2>Your links</h2>
            <span class="pill" id="result-status">Ready</span>
          </div>

          <div class="job-meta">
            <strong id="result-title">Your media is ready</strong>
            <p id="result-copy">Your links will appear here.</p>
          </div>

          <div class="copy-wrap" id="copy-wrap" hidden>
            <button class="button button--ghost" type="button" id="copy-button">Copy all links to clipboard</button>
          </div>

          <div class="results" id="result-list"></div>
        </section>

        <section class="card card--warning" id="fallback-card" hidden>
          <div class="card__head">
            <h2>Heads up</h2>
            <span class="pill pill--warning">Not available as a simple link</span>
          </div>
          <p id="fallback-text"></p>
        </section>
      </main>

      <footer class="site-footer">
        <a href="https://github.com/danysgit/almightydlp" target="_blank" rel="noreferrer">View on GitHub</a>
      </footer>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
